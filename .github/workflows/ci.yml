name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Reuse the shared build-env script for Node — keeps the Node
      # version in sync with the Docker image and release workflow.
      - name: Set up build environment
        run: sudo ./build/appimage/setup-build-env.sh

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Linux: same setup script used by the Docker build image.
      - name: Set up build environment
        if: runner.os == 'Linux'
        run: sudo ./build/appimage/setup-build-env.sh

      # Windows: no shared script yet; native setup.
      - name: Setup Node.js
        if: runner.os == 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: biome-${{ matrix.platform }}
          path: out/make/**/*
