[project]
name = "biome-server"
version = "1.1.0-rc2"
requires-python = "==3.12.*"
dependencies = [
  "world-engine @ https://github.com/Overworldai/world_engine/archive/refs/tags/1.5.4.zip",
  "torch==2.10.0",
  "torchvision==0.25.0",
  "pillow==12.2.0",
  "fastapi==0.135.3",
  "uvicorn==0.44.0",
  "websockets==16.0",
  "hf-xet==1.4.3",
  "timm==1.0.26",
  "py-cpuinfo==9.0.0",
  "nvidia-ml-py==13.595.45",
  "psutil==7.1.3",
  "simplejpeg==1.9.0",
  "accelerate==1.12.0",
  "bitsandbytes==0.49.2",
  "llama-cpp-python==0.3.33",
  "gguf>=0.10.0",
  "imageio-ffmpeg==0.6.0",
]

[dependency-groups]
dev = []

[tool.uv]
index-strategy = "unsafe-best-match"
environments = [
  "sys_platform == 'linux' and platform_machine == 'x86_64'",
  "sys_platform == 'win32' and platform_machine == 'AMD64'",
]
override-dependencies = [
  "triton==3.6.0; sys_platform == 'linux'",
  "triton-windows==3.6.0.post26; sys_platform == 'win32'",
]

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
llama-cpp-python = [
  { url = "https://github.com/JamePeng/llama-cpp-python/releases/download/v0.3.33-cu128-Basic-linux-20260315/llama_cpp_python-0.3.33%2Bcu128.basic-cp312-cp312-linux_x86_64.whl", marker = "sys_platform == 'linux'" },
  { url = "https://github.com/JamePeng/llama-cpp-python/releases/download/v0.3.33-cu128-Basic-win-20260315/llama_cpp_python-0.3.33%2Bcu128.basic-cp312-cp312-win_amd64.whl", marker = "sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
  "F",    # pyflakes
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "I",    # isort
  "N",    # pep8-naming
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "A",    # flake8-builtins
  "C4",   # flake8-comprehensions
  "SIM",  # flake8-simplify
  "RET",  # flake8-return
  "PIE",  # flake8-pie
  "TC",   # flake8-type-checking
  "ICN",  # flake8-import-conventions
  "ARG",  # flake8-unused-arguments
  "FBT",  # flake8-boolean-trap (Rust-style: keyword-only bools)
  "BLE",  # flake8-blind-except
  "DTZ",  # flake8-datetimez
  "ASYNC",# flake8-async
  "TRY",  # tryceratops (exception handling patterns)
  "RUF",  # ruff-specific
  "PLE",  # pylint errors
  "PLW",  # pylint warnings
  "PERF", # perflint
]
ignore = [
  # ─── Permanent ignores ───────────────────────────────────────────────
  "TRY003",  # long error messages — MessageId enum is the structured replacement
  "TRY300",  # consider else block — often hurts readability
  "TRY400",  # use logger.exception over logger.error — too noisy
  "PLW2901", # loop variable overwrites iter — sometimes intentional
  "B008",    # function call in default arg — FastAPI Depends pattern
  "RUF012",  # mutable class attrs require ClassVar — TypedDict subclasses trip this
  "N812",    # lowercase-imported-as-non-lowercase — torch.nn.functional as F is convention
  "N817",    # camelcase-imported-as-acronym — same: library naming conventions

  # ─── Tracking: removed by a specific later refactor step ─────────────
  # Step 3 (AppState — kill module globals):
  "PLW0603", # use of `global` keyword

  # Step 4 (Decompose websocket_endpoint):
  "E402",    # module imports not at top of file — server.py's instrumented import block

  # Step 6 (Tighten engine_manager / boundary types):
  "FBT001",  # boolean-type-hint-positional-arg
  "FBT002",  # boolean-default-value-positional-arg

  # Step 7 (Cleanup pass):
  "BLE001",  # blind except — pervasive defensive code, audit one-by-one
  "SIM105",  # try/except/pass → contextlib.suppress — same audit as BLE001
  "SIM115",  # use context manager when opening a file
  "DTZ005",  # datetime.now() without tzinfo
  "B023",    # function uses loop variable — real bug shape, fix in cleanup
  "E501",    # line too long — many are legitimate (URLs, log strings)
  "E741",    # ambiguous variable name
  "N806",    # non-lowercase variable in function
  "RET504",  # unnecessary assign before return
  "RUF059",  # unused unpacked variable
  "UP007",   # non-pep604 annotation union — last hold-out lives in a forward ref
]

[tool.ruff.lint.per-file-ignores]
# `dispatch_request(msg, websocket)` dies with the typed protocol in step 2;
# `lifespan(app)` signature is FastAPI-mandated and gets revisited in step 3.
"server.py" = ["ARG001"]


