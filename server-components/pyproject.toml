[project]
name = "biome-server"
version = "1.0.0-rc2"
requires-python = "==3.13.*"
dependencies = [
  "world-engine @ https://github.com/Overworldai/world_engine/archive/d211f595335f2e6c46a42003622a12724845cc6c.zip",
  "torch",
  "torchvision",
  "pillow",
  "fastapi>=0.128.0",
  "uvicorn>=0.40.0",
  "httpx>=0.27.0",
  "websockets>=15.0.1",
  "hf-xet>=1.0.0",
  "transformers>=4.60.0",
  "timm>=0.9.0",
  "py-cpuinfo>=9.0.0",
  "pynvml>=12.0.0",
  "simplejpeg>=1.7.0",
  "diffusers>=0.25.0",
  "accelerate>=0.25.0",
  "peft>=0.7.0",
  "bitsandbytes>=0.41.0",
  "qwen-vl-utils>=0.0.2",
  "gguf>=0.6.0",
]

[dependency-groups]
dev = []

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
